services:
  japan-culture-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: japan-culture-mcp:1.3.0
    container_name: japan-culture-mcp
    ports:
      - "8008:8008"
    volumes:
      - ./data:/app/data:ro
    environment:
      - DB_PATH=/app/data/culture_ontology.db
      - MCP_TRANSPORT=sse
      - PORT=8008
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
