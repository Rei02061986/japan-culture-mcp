version: "3.8"

services:
  japan-culture-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: japan-culture-mcp
    restart: unless-stopped
    volumes:
      - ./data:/app/data:ro
    environment:
      - DB_PATH=/app/data/culture_ontology.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
    # For stdio transport (default MCP), use stdin_open and tty
    stdin_open: true
    tty: true
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
