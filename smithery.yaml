name: japan-culture-mcp
version: 1.3.0
description: |
  Japan Culture MCP: 8.3M cultural entities, 7.6M connections.
  Covers anime/manga pilgrimage spots, traditional crafts,
  cultural heritage, literature, and geo-enriched tourism assets.
  45 tools for CCDM research, tourism planning, and cultural discovery.

homepage: https://github.com/Rei02061986/japan-culture-mcp
repository: https://github.com/Rei02061986/japan-culture-mcp

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      db_path:
        type: string
        description: "Path to culture_ontology.db SQLite database"
    required: []
  commandFunction:
    - python3
    - "-m"
    - server.japan_culture_mcp
  env:
    DB_PATH: "{{config.db_path}}"

categories:
  - culture
  - japan
  - tourism
  - research
  - anime
  - geospatial

features:
  - 8.3M Japanese cultural entities
  - 45 MCP tools
  - Anime pilgrimage spots (65,971 connections)
  - Traditional crafts and cultural heritage
  - Release year data (600K+ entities)
  - Geo-enabled spatial search (750K+ entities)
  - CCDM emergence analysis
  - Bulk region comparison (47 prefectures)
  - Dataset export for researchers

examples:
  - query: "京都のアニメ聖地と伝統工芸が近いエリアを教えて"
    tool: get_nearby_culture
  - query: "1995年〜2000年のアニメと聖地数"
    tool: pilgrimage_timeline
  - query: "高知県の文化資源を種類別に整理して"
    tool: get_prefecture_profile
  - query: "全47都道府県の文化資源密度を比較して"
    tool: bulk_region_profiles
  - query: "聖地巡礼のエマージェンスを時系列分析"
    tool: ccdm_emergence_analysis
